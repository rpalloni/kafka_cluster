services:
  kafka1:
    image: apache/kafka:4.1.0
    container_name: kafka1
    environment:
      KAFKA_KRAFT_MODE: 'true' # no more zookeeper to manage brokers
      KAFKA_CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"  # or generate with kafka-storage tool
      KAFKA_BROKER_ID: 1
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller # the single node will act as broker (store and serve data) and controller (cluster coordination)
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093 # the node with controller role (might be a list)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3 # kafka metadata copies - metadata tracks which messages each consumer has read from which topic (default: 3, 1 no backup)

      KAFKA_NUM_PARTITIONS: 3 # set default partitions and replicas for automatically created topics
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093 # open two ports for traffic: one endpoint for prod and cons to r/w, one endpoint for controller comms (node-to-node comms)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092 # endpoint where clients (prod and cons from host machine outside Docker) have to connect
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER # endpoint where controllers have to connect for controller-to-controller talk and voting
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN # set logger level to WARN
       
    ports:
      - "9092:9092"
    volumes:
      - kafka1-data:/var/lib/kafka/data

    healthcheck:
      # test container OWN (localhost) port 9092: only waits for the port to open but doesn't guarantee the Kafka cluster is fully ready!
      # test: sh -c "nc -z localhost 9092 || exit 1"

      # tests if the Kafka broker is fully ready by querying its supported API versions, then discards all output
      test: >
        sh -c "
          /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1
        "
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # Kafka broker takes 20-60 seconds to fully initialize (KRAFT cluster formation, controller election)

  kafka2:
    image: apache/kafka:4.1.0
    container_name: kafka2
    environment:
      KAFKA_KRAFT_MODE: 'true'
      KAFKA_CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_BROKER_ID: 2
      KAFKA_NODE_ID: 2

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3

      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      
    ports:
      - "9093:9092"
    volumes:
      - kafka2-data:/var/lib/kafka/data

    healthcheck:
      test: >
        sh -c "
          /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1
        "
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka3:
    image: apache/kafka:4.1.0
    container_name: kafka3
    environment:
      KAFKA_KRAFT_MODE: 'true'
      KAFKA_CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_BROKER_ID: 3
      KAFKA_NODE_ID: 3

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3

      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      
    ports:
      - "9094:9092"
    volumes:
      - kafka3-data:/var/lib/kafka/data

    healthcheck:
      test: >
        sh -c "
          /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1
        "
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafkaui:
    container_name: kafkaui
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - 8888:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092,kafka2:9092,kafka3:9092 # address where to connect
      SPRING_CONFIG_ADDITIONAL_LOCATION: /config.yml
    volumes:
      - ./kafka-ui-config.yml:/config.yml # set logger level to WARN
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy

volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data: